<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOTrans - 在线文件传输</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .main-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-receive {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e9ecef;
        }

        .btn-receive:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-input-wrapper {
            margin: 20px 0;
        }

        .file-input {
            display: none;
        }

        .file-label {
            display: block;
            padding: 40px 20px;
            border: 2px dashed #667eea;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .file-label:hover {
            background: #eef1ff;
            border-color: #764ba2;
        }

        .file-label.dragover {
            background: #e8ecff;
            border-color: #764ba2;
        }

        .code-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .code-display h3 {
            margin-bottom: 15px;
            font-size: 1em;
            opacity: 0.9;
        }

        .code-number {
            font-size: 3em;
            font-weight: bold;
            letter-spacing: 10px;
            font-family: 'Courier New', monospace;
        }

        .code-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5em;
            text-align: center;
            letter-spacing: 8px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .code-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 0.95em;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .status.waiting {
            background: #fff3e0;
            color: #f57c00;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .back-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .file-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .file-info p {
            margin: 5px 0;
            color: #666;
        }

        .hidden {
            display: none !important;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 EOTrans</h1>
        <p class="subtitle">安全、快速的点对点文件传输</p>

        <!-- 主界面 -->
        <div id="mainSection" class="section active">
            <div class="main-buttons">
                <button class="btn btn-send" onclick="showSend()">
                    📤 发送文件
                </button>
                <button class="btn btn-receive" onclick="showReceive()">
                    📥 接收文件
                </button>
            </div>
            <p style="color: #999; font-size: 0.85em;">
                无需服务器，端到端加密传输<br>
                P2P直连，支持大文件传输
            </p>
        </div>

        <!-- 发送界面 -->
        <div id="sendSection" class="section">
            <div id="fileSelectArea">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" class="file-input" multiple webkitdirectory>
                    <label for="fileInput" class="file-label" id="fileLabel">
                        <div>📁 点击或拖拽文件/文件夹到此处</div>
                        <div style="font-size: 0.85em; color: #666; margin-top: 10px;">
                            支持多文件、文件夹、任意格式
                        </div>
                    </label>
                </div>
                <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: center;">
                    <button class="btn" onclick="selectFiles()" style="padding: 10px 20px; font-size: 0.9em;">选择文件</button>
                    <button class="btn" onclick="selectFolder()" style="padding: 10px 20px; font-size: 0.9em; background: #f8f9fa; color: #333;">选择文件夹</button>
                </div>
            </div>

            <div id="waitingArea" class="hidden">
                <div class="file-info" id="fileInfo"></div>
                <div class="code-display">
                    <h3>请告诉接收者以下数字</h3>
                    <div class="code-number" id="sendCode">--------</div>
                </div>
                <div class="status waiting">
                    <span class="spinner"></span>
                    等待接收者连接...
                </div>
                <button class="btn" onclick="cancelSend()" style="margin-top: 15px; background: #ffebee; color: #c62828;">取消发送</button>
            </div>

            <div id="sendingArea" class="hidden">
                <div class="file-info" id="sendingFileInfo"></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="sendProgress" style="width: 0%"></div>
                </div>
                <div class="status info" id="sendStatus">正在传输...</div>
                <div style="margin-top: 10px; color: #666; font-size: 0.9em;">
                    速度: <span id="sendSpeed">0 B/s</span>
                </div>
            </div>

            <button class="back-btn" onclick="goBack()">← 返回主界面</button>
        </div>

        <!-- 接收界面 -->
        <div id="receiveSection" class="section">
            <div id="codeInputArea">
                <h3 style="margin-bottom: 15px; color: #333;">输入发送者的 8 位数字</h3>
                <input type="text" id="receiveCode" class="code-input" 
                       placeholder="--------" maxlength="8" 
                       oninput="this.value = this.value.replace(/\D/g, '')">
                <button class="btn btn-send" onclick="startReceive()" style="width: 100%;">
                    开始接收
                </button>
            </div>

            <div id="confirmArea" class="hidden">
                <h3 style="margin-bottom: 15px; color: #333;">📋 发送方文件列表</h3>
                <div class="file-info" id="confirmFileList" style="max-height: 200px; overflow-y: auto; text-align: left;"></div>
                <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                    <button class="btn btn-send" onclick="confirmReceive()" style="flex: 1;">✅ 确认接收</button>
                    <button class="btn" onclick="rejectReceive()" style="flex: 1; background: #ffebee; color: #c62828;">❌ 拒绝</button>
                </div>
            </div>

            <div id="receivingArea" class="hidden">
                <div class="file-info" id="receiveFileInfo"></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="receiveProgress" style="width: 0%"></div>
                </div>
                <div class="status info" id="receiveStatus">正在接收...</div>
                <div style="margin-top: 10px; color: #666; font-size: 0.9em;">
                    速度: <span id="receiveSpeed">0 B/s</span>
                </div>
            </div>

            <button class="back-btn" onclick="goBack()">← 返回主界面</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
    
    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;">
        <a href="https://qm.qq.com/q/BekqLZayn6" target="_blank" style="
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        " onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(102, 126, 234, 0.5)';" 
        onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.4)';">
            💬 EOTrans交流群 1061614618
        </a>
    </div>
    
    <div style="position: fixed; bottom: 5px; left: 50%; transform: translateX(-50%); z-index: 99; font-size: 11px; color: rgba(128, 128, 128, 0.6);">
        MCZLF Studio _ Loft Games
    </div>
</body>
</html>
